# Auto-generated by skill-eval-bootstrap on {{date}}.
# Review and tune judge_criteria + edge expectations before relying on this suite.

skill: {{skill_name}}
description: {{auto_description}}

test_cases:
{{#each cases}}
  - id: {{id}}
    kind: {{kind}}
    description: {{description}}
{{#if user_input_present}}
    user_input: "{{user_input}}"
{{/if}}
{{#if expected_activation_present}}
    expected_activation: {{expected_activation}}
{{/if}}
{{#if expected_error}}
    expected_error: "{{expected_error}}"
{{/if}}
{{#if expected_outputs}}
    expected_outputs:
{{#each expected_outputs}}
      - kind: {{kind}}
{{#if path_glob}}
        path_glob: "{{path_glob}}"
{{/if}}
{{#if text}}
        text: "{{text}}"
{{/if}}
{{#if pattern}}
        pattern: "{{pattern}}"
{{/if}}
{{/each}}
{{/if}}
{{#if judge_criteria}}
    judge_criteria:
{{#each judge_criteria}}
      - "{{this}}"
{{/each}}
{{/if}}
{{#if timeout_seconds}}
    timeout_seconds: {{timeout_seconds}}
{{/if}}
{{/each}}
