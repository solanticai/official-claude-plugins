# Example eval suite — drives the harness against skill-evaluator itself.
# Real-world example: meets the required test-category mix.

skill: skill-evaluator
description: Verifies skill-evaluator activates correctly, produces a scored report, and handles malformed inputs.

test_cases:
  # ----- Activation: positive -----
  - id: activate-positive-bare-name
    kind: activation
    description: should fire when user asks to evaluate a skill by name
    user_input: "evaluate the skill-creator skill"
    expected_activation: true

  - id: activate-positive-path
    kind: activation
    description: should fire when a skill directory path is provided
    user_input: "audit utilities/skill-ops/skills/skill-creator"
    expected_activation: true

  - id: activate-positive-quality-query
    kind: activation
    description: should fire on quality-audit phrasing
    user_input: "score this skill against the rubric"
    expected_activation: true

  # ----- Activation: negative -----
  - id: activate-negative-unrelated
    kind: activation
    description: should NOT fire on unrelated coding question
    user_input: "how do I write a regex for IPv6 addresses?"
    expected_activation: false

  - id: activate-negative-different-tool
    kind: activation
    description: should NOT fire when user asks about a different toolchain
    user_invariant: "evaluate my npm package"
    expected_activation: false

  # ----- Functional -----
  - id: functional-evaluate-skill-creator
    kind: functional
    description: produces a scored markdown report and JSON sidecar
    user_input: "utilities/skill-ops/skills/skill-creator --fast"
    expected_outputs:
      - kind: file_created
        path_glob: "skill-evaluation-skill-creator-*.md"
      - kind: file_created
        path_glob: "skill-evaluation-skill-creator-*.json"
      - kind: contains
        text: "Skill evaluation: skill-creator"
      - kind: matches
        pattern: "Grade [A-F]"
    judge_criteria:
      - "Report cites file:line for every fail-severity finding"
      - "Australian English used throughout the narrative"
      - "Top three fixes are concrete and actionable"
      - "Report does not modify the audited skill directory"
    timeout_seconds: 300

  # ----- Edge cases -----
  - id: edge-empty-argument
    kind: edge-case
    description: shows discovery listing instead of crashing
    user_input: ""
    expected_error: "empty-argument"

  - id: edge-nonexistent-skill
    kind: edge-case
    description: emits target-not-found and lists candidates
    user_input: "this-skill-does-not-exist"
    expected_error: "target-not-found"
