# CI-001 — CRITICAL — A.3 (third-party action not pinned by SHA)
# Target: .github/workflows/release.yml:17
# Evidence: `actions/checkout@v4` is a tag pin. Tags can be moved by the action
#           author; for a release workflow handling signing material, pin by
#           commit SHA.
