# -----------------------------------------------------------------------------
# K8S-001 — CRITICAL — A.7 (privileged: true on app workload)
# Target: charts/api/templates/deployment.yaml:42
# Workload: Deployment/api
# -----------------------------------------------------------------------------
# Remove privileged flag. Replace with explicit capabilities if any are needed.
spec:
  template:
    spec:
      containers:
      - name: api
        # OLD: securityContext: { privileged: true }
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault

# -----------------------------------------------------------------------------
# K8S-002 — HIGH — B.3 (no memory limit)
# Target: charts/api/templates/deployment.yaml:55
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi  # add

